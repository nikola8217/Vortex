global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'vortex-1'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['vortex-1:8080']

  - job_name: 'vortex-2'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['vortex-2:8080']

  - job_name: 'vortex-3'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['vortex-3:8080']