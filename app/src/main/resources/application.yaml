spring:
  application:
    name: vortex
  datasource:
    url: jdbc:postgresql://localhost:5432/vortex
    username: vortex
    password: vortex
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  kafka:
    bootstrap-servers: localhost:9092
  quartz:
    job-store-type: memory
    properties:
      org.quartz.scheduler.instanceName: VortexScheduler
      org.quartz.threadPool.threadCount: 5

scheduler:
  leader-election:
    lock-id: 123456789

worker:
  host: localhost
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true

server:
  port: 8080